services:
  krkr-web:
    build: .
    image: krkr-web:latest
    container_name: krkr-web
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      # games/covers/manifest 鍦ㄥ涓绘寔涔呭寲锛屾柟渚跨敤 File Station 鐩存帴绠＄悊
      - ${GAMES_DIR:-/volume1/game/18+}:/app/games
      - ${COVERS_DIR:-/volume2/base/18x/krkrsdl2_web/covers}:/app/covers
      - ${MANIFEST_DIR:-/volume2/base/18x/krkrsdl2_web}:/app/data
    environment:
      - MANIFEST_PATH=/app/data/manifest.json

